packages:
  - "apps/*"
  - "packages/*"
allowBuilds:
  esbuild: true
  sharp: true
  better-sqlite3-multiple-ciphers: true
# Force-resolve postcss past GHSA (XSS via unescaped </style>, fixed in 8.5.10).
# next pins an older 8.4.x transitively; this lifts it.
#
# Dev-tooling-only Dependabot fixes (none ship in the prod web standalone / worker
# bundle): form-data (CRLF, via jsdom), vite (fs.deny bypass, via vitest), esbuild
# (dev-server, via drizzle-kit/tsup/tsx). Range-keyed so already-patched copies
# (e.g. esbuild 0.25.x) stay untouched.
overrides:
  postcss: "^8.5.10"
  form-data: ">=4.0.6 <5"
  vite: ">=8.0.16 <8.1"
  esbuild: ">=0.28.1 <0.29"
