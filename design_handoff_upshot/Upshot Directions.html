<!doctype html>
<html lang="en">
<head>
<meta charset="utf-8" />
<meta name="viewport" content="width=device-width, initial-scale=1" />
<title>Upshot V2 — Design Directions</title>
<link rel="preconnect" href="https://fonts.googleapis.com" />
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
<link href="https://fonts.googleapis.com/css2?family=Figtree:wght@400;500;600;700&family=Hanken+Grotesk:wght@400;500;600;700&family=JetBrains+Mono:wght@400;500;600&display=swap" rel="stylesheet" />
<style>
  html, body { margin: 0; padding: 0; height: 100%; background: #f0eee9; }
  #root { height: 100vh; }
  .vellum :focus-visible, .beacon :focus-visible { outline: 2px solid var(--coral); outline-offset: 2px; border-radius: 4px; }
</style>
</head>
<body>
<div id="root"></div>

<script src="https://unpkg.com/react@18.3.1/umd/react.development.js" integrity="sha384-hD6/rw4ppMLGNu3tX5cjIb+uRZ7UkRJ6BPkLpg4hAu/6onKUg4lLsHAs9EBPT82L" crossorigin="anonymous"></script>
<script src="https://unpkg.com/react-dom@18.3.1/umd/react-dom.development.js" integrity="sha384-u6aeetuaXnQ38mYT8rp6sbXaQe3NL9t+IBXmnYxwkUI2Hw4bsp2Wvmx4yRQF1uAm" crossorigin="anonymous"></script>
<script src="https://unpkg.com/@babel/standalone@7.29.0/babel.min.js" integrity="sha384-m08KidiNqLdpJqLq95G/LEi8Qvjl/xUYll3QILypMoQ65QorJ9Lvtp2RXYGBFj1y" crossorigin="anonymous"></script>

<script type="text/babel" src="screens/screens.jsx"></script>
<script type="text/babel" src="lib/design-canvas.jsx"></script>

<script type="text/babel" data-presets="react">
  const Canvas = window.DesignCanvas;
  const Section = window.DCSection;
  const Artboard = window.DCArtboard;

  function PhoneFrame({ children }) {
    return (
      <div style={{ width: '100%', height: '100%', background: '#0b0b0c', padding: 11, display: 'flex' }}>
        <div style={{ flex: 1, borderRadius: 34, overflow: 'hidden', position: 'relative', boxShadow: '0 0 0 1px rgba(255,255,255,0.05) inset' }}>{children}</div>
      </div>
    );
  }

  const phoneStyle = { borderRadius: 46, background: '#0b0b0c', boxShadow: '0 8px 40px rgba(0,0,0,0.4)' };

  function App() {
    return (
      <Canvas>
        <Section id="intro" title="Start here" subtitle="Round 1 · two directions to react to">
          <Artboard id="intro" label="How to read this" width={780} height={900}>
            <window.IntroCard />
          </Artboard>
        </Section>

        <Section id="vellum" title="Direction A — Vellum" subtitle="Subtle money signal · four-room IA · editorial calm">
          <Artboard id="a-cover" label="A · Overview" width={440} height={900}>
            <window.VellumCover />
          </Artboard>
          <Artboard id="a-dash" label="A · Dashboard (desktop)" width={1200} height={900}>
            <window.VellumDashboard />
          </Artboard>
          <Artboard id="a-ledger" label="A · Ledger (desktop)" width={1200} height={900}>
            <window.VellumLedger />
          </Artboard>
          <Artboard id="a-phone" label="A · Phone" width={372} height={794} style={phoneStyle}>
            <PhoneFrame><window.VellumPhone /></PhoneFrame>
          </Artboard>
        </Section>

        <Section id="beacon" title="Direction B — Beacon" subtitle="Loud colour-coded money · hub + spaces IA · cockpit clarity">
          <Artboard id="b-cover" label="B · Overview" width={440} height={900}>
            <window.BeaconCover />
          </Artboard>
          <Artboard id="b-dash" label="B · Dashboard (desktop)" width={1200} height={968}>
            <window.BeaconDashboard />
          </Artboard>
          <Artboard id="b-ledger" label="B · Ledger (desktop)" width={1200} height={900}>
            <window.BeaconLedger />
          </Artboard>
          <Artboard id="b-phone" label="B · Phone" width={372} height={794} style={phoneStyle}>
            <PhoneFrame><window.BeaconPhone /></PhoneFrame>
          </Artboard>
        </Section>

        <Section id="compare" title="Compare" subtitle="Trade-offs · and how to blend">
          <Artboard id="cmp" label="Trade-offs" width={860} height={680}>
            <window.CompareCard />
          </Artboard>
          <Artboard id="ideas" label="Ideas to layer in" width={760} height={884}>
            <window.IdeasCard />
          </Artboard>
        </Section>
      </Canvas>
    );
  }

  ReactDOM.createRoot(document.getElementById('root')).render(<App />);
</script>
</body>
</html>
